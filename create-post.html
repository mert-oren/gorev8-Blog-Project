<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Makale yaz</title>

    <!-- DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Axios -->
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>

</head>

<body class="flex flex-col min-h-screen cursor-default">
    <header class="navbar flex justify-center px-8 bg-base-100 shadow-xl bg-black">
        <div class="min-w-180 flex justify-between items-center px-4">
            <a href="articles.html" class="text-2xl text-white">Blog</a>
            <div class="flex items-center gap-4">
                <p class="text-white" id="username">Username</p>
                <button class="btn btn-natural" onclick="logout()">Cikis Yap</button>
            </div>
        </div>
    </header>

    <main class="flex-1 flex justify-center my-8">
        <div class="flex flex-col gap-4 bg-gray-200 p-15 rounded shadow-xl min-w-120 items-center">
            <h1 class="font-bold text-2xl">Yeni makale olustur</h1>
            <div class="fieldset bg-base-200 border-base-300 rounded-box w-xs border p-4 min-w-full">
                <label class="label">Makale Basligi</label>
                <input type="text" class="w-full border-gray-200 py-3 px-4" placeholder="Baslik" id="titleInput">
                <label class="label">Kategori</label>
                <select class="w-full border-gray-200 py-2.5 px-4" id="categoryInput">
                    <option selected disabled>Kategori Secin</option>
                    <option>Frontend</option>
                    <option>Backend</option>
                    <option>DevOps</option>
                </select>
            </div>
            <div class="min-w-full">
                <textarea class="textarea w-full h-90 py-4" placeholder="Makalenizi yazin..."
                    id="articleInput"></textarea>
            </div>

            <div
                class="flex flex-col justify-center items-center bg-base-200 border-base-300 rounded-box w-xs border p-4 min-w-full">
                <button class="btn bg-green-700 text-white border-none my-4 min-w-full"
                    onclick="publish()">Yayinla</button>
                <p id="resultPositive" class="text-green-800"></p>
                <p id="resultNegative" class="text-red-800"></p>
            </div>
        </div>
    </main>

    <footer class="footer flex justify-center sm:footer-horizontal bg-neutral text-neutral-content items-center p-4">
        <p>© Mert Ören 2026</p>
    </footer>

    <script>


        const token = localStorage.getItem("token");
        const savedUser = localStorage.getItem("user");

        if (!token) {
            window.location.href = "login.html";
        }

        const usernameElement = document.getElementById("username");

        if (savedUser) {
            const user = JSON.parse(savedUser);
            usernameElement.innerText = user.username;
        }

        const API_URL = "https://api.zaferayan.com";
        const ENDPOINT = "/posts";

        const titleInput = document.getElementById("titleInput");
        const categoryInput = document.getElementById("categoryInput");
        const articleInput = document.getElementById("articleInput");

        const resultPositive = document.getElementById("resultPositive");
        const resultNegative = document.getElementById("resultNegative");

        function publish() {

            const title = titleInput.value.trim();
            const category = categoryInput.value;
            const body = articleInput.value.trim();


            if (!title || !category || category === "Kategori Secin" || !body) {
                document.getElementById("resultNegative").innerText = "Lutfen tum alanlari doldurun."
                return;
            }

            axios.post(
                `${API_URL}${ENDPOINT}`,
                { title, category, body },
                {
                    headers: {
                        Authorization: `Bearer ${token}`,
                    },
                }
            )
                .then(() => {
                    resultNegative.innerText = "";
                    resultPositive.innerText = "Makale basariyla eklendi. Makaleler sayfasina yonlendiriliyorsunuz.";

                    setTimeout(() => {
                        window.location.href = "articles.html";
                    }, 2000);
                })
                .catch(() => {
                    resultNegative.innerText = "Makale eklenemedi. Token veya sunucu hatasi olabilir.";
                });

        }

        function logout() {
            //Kayitli kullanici bilgilerini sil
            localStorage.removeItem("token");
            localStorage.removeItem("user");

            //kullaniciyi register ekranina yonlendir
            window.location.href = "login.html";
        }


    </script>
</body>

</html>
