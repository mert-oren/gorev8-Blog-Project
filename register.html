<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - Register Page</title>

    <!-- DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Axios -->
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>

</head>

<body class="flex flex-col min-h-screen">
    <!-- Header - Navbar -->
    <header class="navbar flex justify-center bg-base-100 shadow-xl bg-black">
        <!-- Logo - Ana sayfa linki -->
        <a href="articles.html" class="text-2xl text-white">Blog</a>
    </header>

    <main class="flex-1 flex justify-center items-center">
        <!-- Register Container -->
        <div class="bg-gray-200 p-15 rounded shadow-xl">
            <!-- Register Header -->
            <div class="flex flex-col justify-center items-center pb-4 gap-2">
                <h1 class="font-bold text-2xl">Aramiza Katilin</h1>
                <p class="opacity-70">Yeni hesap oluşturmak için bilgilerinizi girin.</p>
            </div>

            <!-- Register Fieldset -->
            <fieldset class="fieldset bg-base-200 border-base-300 rounded-box w-xs border p-4">
                <!-- Username -->
                <label class="label">Kullanici Adi</label>
                <input class="input rounded-box" type="text" placeholder="Kullanici adinizi girin" id="username">
                <!-- Email -->
                <label class="label">E-posta</label>
                <input type="email" placeholder="E-mail adresinizi girin" class="input rounded-box" id="email">
                <!-- Sifre -->
                <label class="label">Sifre</label>
                <input type="password" placeholder="Sifrenizi girin" class="input rounded-box" id="password">
                <!-- Button -->
                <button class="btn btn-neutral my-4" onclick="register()">Kayit ol</button>

                <!-- Onclick Result -->
                <div id="result" class="text-center"></div>
                <hr class="opacity-10">
                <!-- Redirect Login -->
                <div class="flex gap-1 justify-center mt-2">
                    <p>Zaten uye misiniz?</p>
                    <a href="login.html" class="text-blue-500 font-bold">Giris yap</a>
                </div>
            </fieldset>
        </div>
    </main>
    <!-- Footer -->
    <footer class="footer flex justify-center sm:footer-horizontal bg-neutral text-neutral-content items-center p-10">
        <p>© Mert Ören 2026</p>
    </footer>


    <script>

        // Inputlari cek
        const usernameInput = document.getElementById("username");
        const emailInput = document.getElementById("email");
        const passwordInput = document.getElementById("password");

        //API + Endpoint tanimla
        const API_URL = "https://api.zaferayan.com";
        const ENDPOINT = "/auth/register";

        //Register Onclick Fonksiyonu
        function register() {

            //Inputlardan degerleri cek
            const username = usernameInput.value.trim();
            const email = emailInput.value.trim();
            const password = passwordInput.value.trim();

            //Tum alanlarin bir degeri var mi kontrol et
            if (!username || !email || !password) {
                //Hata mesaji yazdir
                document.getElementById("result").innerHTML = `<p class="mt-2 text-sm text-red-600">Tum alanlari doldurun</p>`;
                return;
            }

            //API'ye register istegi gonder ve inputtan alinan username-email-password bilgisini body icine gonder
            axios.post(`${API_URL}${ENDPOINT}`, { username, email, password })

                //Sunucudan basarili cevap gelirse .then i calistir
                .then(({ data }) => {
                    //gelen cevaptaki token ve kullanici bilgilerini al
                    const { token, user } = data;

                    //Token bilgisini Localstorage'a kaydet
                    localStorage.setItem("token", token);
                    //Kullanici bilgilerini stringe cevir ve Localstorage'a kaydet
                    localStorage.setItem("user", JSON.stringify(user));

                    //Kullaniciya basarili kayit bilgisini ver
                    document.getElementById("result").innerHTML = `<p class="mt-2 text-sm text-green-600">Kayit Basarili. Ana sayfaya yonlendiriliyorsunuz.</p>`;
                    //2 Saniye bekleyip kullaniciyi ana icerik sayfasina yonlendir
                    setTimeout(() => {
                        window.location.href = "articles.html";
                    }, 2000);
                })
                //Sunucudan gelen cevap basarisiz ise .catch calistir
                .catch(function (err) {
                    //Kullaniciya hatali giris mesaji ver
                    document.getElementById("result").innerHTML = `<p class="mt-2 text-sm text-red-600">Kayit Basarisiz. <br> Bu kullanici adi ya da E-posta zaten kayitli</p>`;
                })
        }

    </script>
</body>

</html>
