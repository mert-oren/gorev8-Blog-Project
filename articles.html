<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Ana Sayfa</title>

    <!-- DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Axios -->
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>

</head>

<body class="flex flex-col min-h-screen cursor-default">
    <header class="navbar flex justify-between px-8 bg-base-100 shadow-xl bg-black">
        <a href="articles.html" class="text-2xl text-white">Blog</a>
        <div class="flex items-center gap-4">
            <span class="text-white" id="navUsername"></span>
            <a href="create-post.html" class="btn btn-soft btn-success">Makale Olustur</a>
            <button class="btn btn-soft btn-error" onclick="logout()">Cikis yap</button>
        </div>
    </header>

    <main class="flex-1 flex flex-col items-center py-4 gap-4">
        <h1 class="font-bold text-4xl">Dusuncelerin Dunyasi</h1>
        <p class="text-center">Dunyanin en harika makalelerinin yayinlandigi bu platforma hosgeldiniz!</p>

        <div id="articles"
            class="mx-auto grid max-w-7xl grid-cols-1 gap-6 p-4 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4">
        </div>

    </main>

    <footer class="footer flex justify-center sm:footer-horizontal bg-neutral text-neutral-content items-center p-10">
        <p>© Mert Ören 2026</p>
    </footer>
</body>

<script>

    //Kullanici adi
    const navUsername = document.getElementById("navUsername");
    //Makalelerin gosterilecegi alan
    const articles = document.getElementById("articles");

    const token = localStorage.getItem("token");
    const savedUser = localStorage.getItem("user");

    if (!token) {
        window.location.href = "login.html";
        return;
    }

    if (savedUser) {
        const user = JSON.parse(savedUser);
        navUsername.innerText = user.username;
    }

    //Gercek API bilgileri
    const API_URL = "https://api.zaferayan.com";
    const ENDPOINT = "/posts";




    //Makaleleri getir ve ekrana bas
    function getArticles() {

        // //Simdilik local json ile test
        // axios.get("./articles.json")

        axios.get(`${API_URL}${ENDPOINT}`)

            .then(({ data: articlesData }) => {
                //her makale icin card olustur
                //en sonunda tum kartlari .join("") ile tek bir metin haline getir
                const html = articlesData.map(({ title, body, author, category }) => `
                <div class='card bg-base-200'>
                    <div class='card-body'>
                        <div class='card-title'>${title}</div>
                        <p>${body}</p>
                        <div class='card-actions flex-col'>
                            <p>Yazar: ${author?.username || "Bilinmiyor"}</p>
                            <div class='badge badge-soft badge-primary'>${category}</div>
                        </div>
                    </div>
                </div>
            `).join("");

                //Olusturulan kartlari sayfaya yerlestir
                articles.innerHTML = html;
            })
            .catch(() => {
                alert("Makaleler goruntulenemedi.");
            })
    }

    //Logout fonksiyonu
    function logout() {
        localStorage.clear();
        window.location.href = "login.html";
    }
    //Makaleleri cek
    getArticles();

</script>

</html>
